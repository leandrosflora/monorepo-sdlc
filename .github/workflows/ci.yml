name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      # A solution referencia pyprojs de repos irmãos que não existem no
      # checkout do CI, então o build é feito direto no csproj.
      - run: dotnet build monorepo-sdlc.csproj --configuration Release
